<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>濟州島行程</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2F2F7;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;color:#1C1C1E;padding-bottom:48px}
.app{max-width:480px;margin:0 auto;padding:16px 14px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.top-title{font-size:17px;font-weight:700}
.icon-btn{display:flex;align-items:center;gap:5px;background:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-family:inherit;color:#3A3A3C;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.1);font-weight:500}
.save-btn{background:#007AFF;color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.cancel-btn{background:#F2F2F7;color:#3A3A3C;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer}
.day-section{margin-bottom:24px}
.day-label-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 2px}
.day-pill{background:#fff;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.08);white-space:nowrap}
.day-subtitle{font-size:14px;color:#3A3A3C}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.07)}
.event-row{display:flex;align-items:stretch}
.event-row+.event-row{border-top:1px solid #F2F2F7}
.time-col{width:62px;padding:18px 0 18px 14px;display:flex;align-items:flex-start;justify-content:flex-end;flex-shrink:0}
.time-text{font-size:12px;color:#8E8E93;padding-top:2px;white-space:nowrap}
.dot-col{width:32px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;position:relative}
.dot-line{position:absolute;top:0;bottom:0;left:50%;width:1px;background:#E5E5EA;transform:translateX(-50%)}
.dot{width:10px;height:10px;border-radius:50%;margin-top:20px;z-index:1;position:relative;flex-shrink:0}
.info-col{flex:1;padding:14px 14px 16px 6px;min-width:0}
.event-name{font-size:15px;font-weight:700;color:#1C1C1E;margin-bottom:3px;display:flex;align-items:center;gap:5px;line-height:1.3}
.event-name a{color:inherit;text-decoration:none;word-break:break-all}
.event-desc{font-size:13px;color:#636366;margin-bottom:7px;line-height:1.4}
.tag-pill{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px}
.tag-入境{background:#E3F0FF;color:#1A5FB4}
.tag-餐飲{background:#FFF3E0;color:#E65100}
.tag-購物{background:#EDE7F6;color:#5E35B1}
.tag-咖啡廳{background:#E8F5E9;color:#2E7D32}
.tag-景點{background:#E0F7FA;color:#00695C}
.tag-市場{background:#FFF8E1;color:#F57F17}
.tag-甜點{background:#FCE4EC;color:#C62828}
.tag-機場{background:#ECEFF1;color:#455A64}
.tag-default{background:#E3F0FF;color:#1A5FB4}
.hotel-row{background:#FAFAFA;border-top:1px solid #F2F2F7;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.hotel-icon{font-size:18px;line-height:1.4}
.hotel-text{font-size:13px;color:#3A3A3C;line-height:1.5}
.hotel-text strong{color:#1C1C1E;font-weight:700}
.hotel-note{font-size:11px;color:#8E8E93;margin-top:2px}
.edit-section{margin-bottom:28px}
.edit-day-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.edit-day-pill{background:#007AFF;color:#fff;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;white-space:nowrap}
.edit-day-input{font-family:inherit;font-size:13px;border:1px solid #D1D1D6;border-radius:10px;padding:6px 10px;color:#1C1C1E;background:#fff;outline:none;flex:1;min-width:0}
.edit-day-input:focus{border-color:#007AFF}
.edit-cards{display:flex;flex-direction:column;gap:10px}
.edit-card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 1px 5px rgba(0,0,0,0.07);display:flex;flex-direction:column;gap:8px}
.edit-card-top{display:flex;align-items:center;gap:8px}
.edit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.edit-num{font-size:11px;color:#8E8E93;font-weight:500;flex:1}
.btn-del{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;color:#FF3B30;font-size:18px;line-height:1}
.edit-row-2{display:grid;grid-template-columns:90px 1fr;gap:6px}
.edit-field{display:flex;flex-direction:column;gap:3px}
.edit-label{font-size:10px;color:#8E8E93;font-weight:500}
.edit-input{font-family:inherit;font-size:14px;border:1px solid #E5E5EA;border-radius:8px;padding:8px 10px;color:#1C1C1E;background:#F7F7F8;outline:none;width:100%}
.edit-input:focus{border-color:#007AFF;background:#fff}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;background:#fff;border:1.5px dashed #C7C7CC;border-radius:14px;font-family:inherit;font-size:14px;color:#007AFF;cursor:pointer;font-weight:500;margin-top:2px}
.hotel-edit-card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 1px 5px rgba(0,0,0,0.07);display:flex;flex-direction:column;gap:8px;margin-top:10px}
.hotel-edit-title{font-size:11px;color:#8E8E93;font-weight:500}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1}
.reset-bar{text-align:center;margin-top:8px;padding-bottom:16px}
.reset-btn{background:none;border:none;font-size:12px;color:#C7C7CC;font-family:inherit;cursor:pointer;padding:4px 8px}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
var DC=['#007AFF','#FF9500','#34C759','#AF52DE','#FF3B30','#5AC8FA','#FF2D55'];
function dc(i){return DC[i%DC.length];}
function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── JSONBin 設定 ── */
var API_KEY='$2a$10$rczBSkZG8pSMAix5NheTou9XoPxrTkCl86AXTPdaRoMFHYxNj6mtS';
var BIN_ID='69f72a9736566621a81d0e80'; /* 已綁定雲端 */
var STORAGE_KEY='jeju_bin_id_v1';

/* ── 預設資料 ── */
var DEFAULT_DATA=[
  {day:1,date:'10/18（日）抵達濟州',events:[
    {time:'17:00',title:'抵達濟州國際機場',link:'https://www.google.com/maps/search/Jeju+International+Airport',tag:'機場',desc:'辦理入境'},
    {time:'18:30',title:'晚餐：熟成道 (總店)',link:'https://www.google.com/maps/search/Sukseongdo+Main+Branch+Jeju',tag:'餐飲',desc:'熱門熟成黑豬肉。備案：굽는밤'},
    {time:'20:30',title:'蓮洞商圈 (努韋瑪魯街)',link:'https://www.google.com/maps/search/Nuwemaru+Street',tag:'購物',desc:'夜間購物'}
  ],hotel:'濟州市區 (蓮洞附近)',hotelNote:''},
  {day:2,date:'10/19（一）涯月海岸精華',events:[
    {time:'09:00',title:'宇進解酒湯',link:'https://www.google.com/maps/search/Ujin+Haejangguk',tag:'餐飲',desc:''},
    {time:'10:30+',title:'SLOWBOAT Atelier',link:'https://www.google.com/maps/search/Slowboat+Atelier+Jeju',tag:'咖啡廳',desc:''},
    {time:'12:00',title:'제주따이 (鮑魚飯)',link:'https://www.google.com/maps/search/Jejuttai+Jeju',tag:'餐飲',desc:'15:00 關門，請提早前往'},
    {time:'16:30+',title:'Haejigae Cafe',link:'https://www.google.com/maps/search/Haejigae+Cafe+Jeju',tag:'咖啡廳',desc:'觀賞夕陽'}
  ],hotel:'西歸浦市區',hotelNote:''},
  {day:3,date:'10/20（二）南部 → 東部',events:[
    {time:'10:00',title:'橘花閣樓 (Gyulkkot Darak)',link:'https://www.google.com/maps/search/Gyulkkot+Darak',tag:'咖啡廳',desc:''},
    {time:'11:30',title:'西歸浦偶來市場',link:'https://www.google.com/maps/search/Seogwipo+Maeil+Olle+Market',tag:'市場',desc:''},
    {time:'14:30',title:'城山日出峰',link:'https://www.google.com/maps/search/Seongsan+Ilchulbong',tag:'景點',desc:'世界遺產'},
    {time:'16:30',title:'ORRRN (오른)',link:'https://www.google.com/maps/search/Orrrn+Cafe+Jeju',tag:'咖啡廳',desc:''}
  ],hotel:'城山附近',hotelNote:'建議提早訂房，城山周邊住宿選擇較少'},
  {day:4,date:'10/21（三）牛島 → 搭機',events:[
    {time:'09:00',title:'牛島環島',link:'https://www.google.com/maps/search/Udo+Island+Jeju',tag:'景點',desc:'搭渡輪前往'},
    {time:'11:00',title:'花生冰淇淋',link:'https://www.google.com/maps/search/Udo+Peanut+Ice+Cream',tag:'甜點',desc:'牛島名產'},
    {time:'12:30',title:'午餐：漢拏山炒飯',link:'https://www.google.com/maps/search/Pungwon+Udo',tag:'餐飲',desc:''},
    {time:'18:00',title:'抵達濟州機場',link:'https://www.google.com/maps/search/Jeju+International+Airport',tag:'機場',desc:'返程'}
  ],hotel:'',hotelNote:''}
];

var data=JSON.parse(JSON.stringify(DEFAULT_DATA));

/* ── Toast ── */
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

/* ── Tag class ── */
function tagClass(tag){
  var allowed=['入境','餐飲','購物','咖啡廳','景點','市場','甜點','機場'];
  return 'tag-pill '+(allowed.indexOf(tag)>=0?'tag-'+tag:'tag-default');
}

/* ── JSONBin API ── */
function binHeaders(){
  return {'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Private':'false'};
}

/* 建立新 Bin */
function createBin(payload, cb){
  fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:Object.assign({},binHeaders(),{'X-Bin-Name':'jeju-itinerary'}),
    body:JSON.stringify(payload)
  })
  .then(function(r){return r.json();})
  .then(function(j){
    var id=j.metadata&&j.metadata.id;
    if(id){
      BIN_ID=id;
      try{localStorage.setItem(STORAGE_KEY,id);}catch(e){}
      cb(null,id);
    } else {
      cb('建立失敗');
    }
  })
  .catch(function(e){cb(e.message);});
}

/* 更新已有 Bin */
function updateBin(id, payload, cb){
  fetch('https://api.jsonbin.io/v3/b/'+id,{
    method:'PUT',
    headers:binHeaders(),
    body:JSON.stringify(payload)
  })
  .then(function(r){return r.json();})
  .then(function(){cb(null);})
  .catch(function(e){cb(e.message);});
}

/* 讀取 Bin */
function readBin(id, cb){
  fetch('https://api.jsonbin.io/v3/b/'+id+'/latest',{
    headers:{'X-Master-Key':API_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(j){
    if(j.record) cb(null,j.record);
    else cb('讀取失敗');
  })
  .catch(function(e){cb(e.message);});
}

/* ── 啟動：讀取資料 ── */
function init(){
  /* 網址帶有 bin id 優先（分享連結） */
  var hash=window.location.hash.slice(1);
  var idFromUrl=(hash.match(/^[a-f0-9]{24}$/i)||[])[0];
  var idFromStorage=null;
  try{idFromStorage=localStorage.getItem(STORAGE_KEY);}catch(e){}

  var targetId=idFromUrl||idFromStorage||null;

  if(targetId){
    BIN_ID=targetId;
    /* 如果是從分享連結來的，存進 localStorage */
    if(idFromUrl && !idFromStorage){
      try{localStorage.setItem(STORAGE_KEY,idFromUrl);}catch(e){}
    }
    /* 清掉 hash */
    if(idFromUrl) history.replaceState(null,'',window.location.pathname+window.location.search);

    showToast('⏳ 載入行程中…');
    readBin(targetId,function(err,record){
      if(!err && Array.isArray(record)){
        data=record;
      } else {
        showToast('⚠️ 載入失敗，顯示預設行程');
      }
      renderView();
    });
  } else {
    /* 全新使用者，直接顯示預設 */
    renderView();
  }
}

/* ── 儲存到雲端 ── */
function persistData(cb){
  if(BIN_ID){
    updateBin(BIN_ID,data,function(err){
      if(cb) cb(err);
    });
  } else {
    createBin(data,function(err,id){
      if(cb) cb(err);
    });
  }
}

function resetData(){
  if(!confirm('確定要還原為預設行程？目前的修改將全部清除。')) return;
  data=JSON.parse(JSON.stringify(DEFAULT_DATA));
  showToast('⏳ 儲存中…');
  persistData(function(err){
    showToast(err?'⚠️ 還原失敗':'✓ 已還原預設行程');
    renderView();
  });
}

/* ── 瀏覽模式 ── */
function renderView(){
  var html='<div class="app">';
  html+='<div class="top-bar">';
  html+='<span class="top-title">🗺 濟州島行程</span>';
  html+='<div style="display:flex;gap:8px">';
  html+='<button class="icon-btn" onclick="renderEdit()">✏️ 編輯</button>';
  html+='<button class="icon-btn" onclick="shareLink()">🔗 分享</button>';
  html+='</div></div>';

  for(var di=0;di<data.length;di++){
    var day=data[di];
    html+='<div class="day-section">';
    html+='<div class="day-label-row">';
    html+='<span class="day-pill">Day '+day.day+'</span>';
    html+='<span class="day-subtitle">'+esc(day.date)+'</span>';
    html+='</div>';
    html+='<div class="card">';
    for(var ei=0;ei<day.events.length;ei++){
      var ev=day.events[ei];
      html+='<div class="event-row">';
      html+='<div class="time-col"><span class="time-text">'+esc(ev.time)+'</span></div>';
      html+='<div class="dot-col"><div class="dot-line"></div><div class="dot" style="background:'+dc(ei)+'"></div></div>';
      html+='<div class="info-col">';
      html+='<div class="event-name"><a href="'+esc(ev.link||'#')+'" target="_blank">'+esc(ev.title)+'</a> 📍</div>';
      if(ev.desc) html+='<div class="event-desc">'+esc(ev.desc)+'</div>';
      if(ev.tag) html+='<span class="'+tagClass(ev.tag)+'">'+esc(ev.tag)+'</span>';
      html+='</div></div>';
    }
    if(day.hotel){
      html+='<div class="hotel-row"><span class="hotel-icon">🏨</span><div>';
      html+='<div class="hotel-text">建議住宿：<strong>'+esc(day.hotel)+'</strong></div>';
      if(day.hotelNote) html+='<div class="hotel-note">💡 '+esc(day.hotelNote)+'</div>';
      html+='</div></div>';
    }
    html+='</div></div>';
  }
  html+='<div class="reset-bar"><button class="reset-btn" onclick="resetData()">↩ 還原預設行程</button></div>';
  html+='</div>';
  document.getElementById('root').innerHTML=html;
}

/* ── 編輯模式 ── */
function renderEdit(){
  var html='<div class="app">';
  html+='<div class="top-bar">';
  html+='<span class="top-title">✏️ 編輯行程</span>';
  html+='<div style="display:flex;gap:8px">';
  html+='<button class="cancel-btn" onclick="renderView()">取消</button>';
  html+='<button class="save-btn" onclick="saveEdit()">☁️ 儲存</button>';
  html+='</div></div>';

  for(var di=0;di<data.length;di++){
    var day=data[di];
    html+='<div class="edit-section">';
    html+='<div class="edit-day-header">';
    html+='<span class="edit-day-pill">Day '+day.day+'</span>';
    html+='<input class="edit-day-input" id="date-'+di+'" value="'+esc(day.date)+'" placeholder="日期標題">';
    html+='</div>';
    html+='<div class="edit-cards" id="cards-'+di+'">';
    for(var ei=0;ei<day.events.length;ei++){
      html+=editCard(di,ei);
    }
    html+='</div>';
    html+='<button class="btn-add" onclick="addEvent('+di+')">＋ 新增行程</button>';
    html+='<div class="hotel-edit-card">';
    html+='<span class="hotel-edit-title">🏨 住宿</span>';
    html+='<div class="edit-field"><span class="edit-label">住宿地點</span>';
    html+='<input class="edit-input" id="hotel-'+di+'" value="'+esc(day.hotel||'')+'" placeholder="住宿地點（可留空）"></div>';
    html+='<div class="edit-field"><span class="edit-label">住宿備註</span>';
    html+='<input class="edit-input" id="hotelnote-'+di+'" value="'+esc(day.hotelNote||'')+'" placeholder="備註（可留空）"></div>';
    html+='</div></div>';
  }
  html+='</div>';
  document.getElementById('root').innerHTML=html;
}

/* ── 編輯卡片 ── */
function editCard(di,ei){
  var ev=data[di].events[ei];
  var h='<div class="edit-card" id="card-'+di+'-'+ei+'">';
  h+='<div class="edit-card-top">';
  h+='<div class="edit-dot" style="background:'+dc(ei)+'"></div>';
  h+='<span class="edit-num">第 '+(ei+1)+' 項</span>';
  h+='<button class="btn-del" onclick="delEvent('+di+','+ei+')">🗑</button>';
  h+='</div>';
  h+='<div class="edit-row-2">';
  h+='<div class="edit-field"><span class="edit-label">時間</span>';
  h+='<input class="edit-input" id="time-'+di+'-'+ei+'" value="'+esc(ev.time)+'" placeholder="09:00"></div>';
  h+='<div class="edit-field"><span class="edit-label">標籤</span>';
  h+='<input class="edit-input" id="tag-'+di+'-'+ei+'" value="'+esc(ev.tag)+'" placeholder="餐飲／景點…"></div>';
  h+='</div>';
  h+='<div class="edit-field"><span class="edit-label">景點／活動名稱</span>';
  h+='<input class="edit-input" id="title-'+di+'-'+ei+'" value="'+esc(ev.title)+'" placeholder="名稱"></div>';
  h+='<div class="edit-field"><span class="edit-label">備註說明</span>';
  h+='<input class="edit-input" id="desc-'+di+'-'+ei+'" value="'+esc(ev.desc)+'" placeholder="補充說明（可留空）"></div>';
  h+='<div class="edit-field"><span class="edit-label">Google Maps 連結</span>';
  h+='<input class="edit-input" id="link-'+di+'-'+ei+'" value="'+esc(ev.link||'')+'" placeholder="https://..."></div>';
  h+='</div>';
  return h;
}

/* ── 收集表單資料 ── */
function collectEditState(){
  for(var di=0;di<data.length;di++){
    var dateEl=document.getElementById('date-'+di);
    if(dateEl) data[di].date=dateEl.value;
    var hotelEl=document.getElementById('hotel-'+di);
    if(hotelEl) data[di].hotel=hotelEl.value;
    var noteEl=document.getElementById('hotelnote-'+di);
    if(noteEl) data[di].hotelNote=noteEl.value;
    for(var ei=0;ei<data[di].events.length;ei++){
      var t=document.getElementById('time-'+di+'-'+ei);
      var ti=document.getElementById('title-'+di+'-'+ei);
      var tg=document.getElementById('tag-'+di+'-'+ei);
      var d=document.getElementById('desc-'+di+'-'+ei);
      var l=document.getElementById('link-'+di+'-'+ei);
      if(t)  data[di].events[ei].time=t.value;
      if(ti) data[di].events[ei].title=ti.value;
      if(tg) data[di].events[ei].tag=tg.value;
      if(d)  data[di].events[ei].desc=d.value;
      if(l)  data[di].events[ei].link=l.value;
    }
  }
}

/* ── 儲存（上傳雲端）── */
function saveEdit(){
  collectEditState();
  showToast('⏳ 儲存中…');
  persistData(function(err){
    if(err){
      showToast('⚠️ 儲存失敗：'+err);
    } else {
      showToast('✅ 已儲存到雲端');
      renderView();
    }
  });
}

function addEvent(di){
  collectEditState();
  data[di].events.push({time:'',title:'',link:'',tag:'',desc:''});
  renderEdit();
}

function delEvent(di,ei){
  if(data[di].events.length<=1){showToast('⚠️ 至少保留一筆');return;}
  collectEditState();
  data[di].events.splice(ei,1);
  renderEdit();
}

/* ── 分享：網址帶 bin id，永遠指向最新資料 ── */
function shareLink(){
  if(!BIN_ID){
    showToast('⚠️ 請先儲存行程再分享');
    return;
  }
  var base=window.location.href.split('#')[0];
  var url=base+'#'+BIN_ID;

  if(navigator.share){
    navigator.share({title:'濟州島行程',url:url}).catch(function(){});
    return;
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){
      showToast('✓ 連結已複製');
    }).catch(function(){ fallbackCopy(url); });
    return;
  }
  fallbackCopy(url);
}

function fallbackCopy(text){
  var el=document.createElement('textarea');
  el.value=text;
  el.style.cssText='position:fixed;top:-999px;left:-999px;opacity:0';
  document.body.appendChild(el);
  el.focus(); el.select();
  try{ document.execCommand('copy'); showToast('✓ 連結已複製'); }
  catch(e){ prompt('請手動複製以下連結：',text); }
  document.body.removeChild(el);
}

init();
</script>
